name: album_mundial
description: App para gestionar el álbum del Mundial 2026 con grupos familiares e intercambios.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # HTTP client
  dio: ^5.7.0

  # Local storage
  hive_flutter: ^1.1.0

  # Ads
  google_mobile_ads: ^5.3.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  confetti: ^0.7.0

  # Scan / OCR
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#1B5E20"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#1B5E20"
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
